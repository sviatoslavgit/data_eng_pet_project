services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist
      POSTGRES_DB: olist
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olist -d olist"]
      interval: 5s
      timeout: 5s
      retries: 10

  olist-parser:
    build: .
    volumes:
      - ./data:/app/data
      - kagglehub-cache:/root/.cache/kagglehub

  olist-raw-loader:
    build: .
    command: python load_olist_raw.py
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://olist:olist@postgres:5432/olist
    volumes:
      - ./data:/app/data

  olist-orders-loader:
    build: .
    command: python load_olist_orders.py
    depends_on:
      olist-raw-loader:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://olist:olist@postgres:5432/olist

  olist-warehouse-loader:
    build: .
    command: python build_olist_warehouse.py --batch-size 5000
    depends_on:
      olist-raw-loader:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://olist:olist@postgres:5432/olist
      WAREHOUSE_BATCH_SIZE: 5000

volumes:
  kagglehub-cache:
  postgres-data:
